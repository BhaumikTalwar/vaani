services:
    web:
        build:
            context: .
            dockerfile: Dockerfile
        ports:
            - "42069:80"
        environment:
            - NODE_ENV=production
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
            interval: 30s
            timeout: 10s
            retries: 3

networks:
    default:
        name: vaani-network
